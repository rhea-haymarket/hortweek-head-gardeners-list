<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Head Gardeners list</title>
  <link rel="stylesheet" href="head-gardeners.css" />
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <div class="az" id="azBar" aria-label="Filter by first letter">
        <!-- injected -->
      </div>
      <div class="searchRow">
        <div class="searchLabel">Search by name</div>
        <input id="searchInput" class="searchInput" type="search" placeholder="Type a name…" autocomplete="off" />
      </div>
      <div class="regionRow">
        <div class="searchLabel">Filter by region</div>
        <select id="regionSelect" class="regionSelect">
          <option value="ALL">All regions</option>
        </select>
      </div>
    </div>
    <div id="grid" class="grid" aria-live="polite"></div>
    <div id="empty" class="empty" style="display:none;">No results. Try another letter or search term.</div>
  </div>
  <script src="head-gardeners.js"></script>
</body>
</html>
